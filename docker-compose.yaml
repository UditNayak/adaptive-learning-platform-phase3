version: "3.9"

services:
  db:
    image: postgres:15
    container_name: adaptive_db
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  searxng:
    image: searxng/searxng:latest
    container_name: adaptive_searxng
    restart: always
    ports:
      - "8080:8080"
    volumes:
      - ./searxng:/etc/searxng

  backend:
    build:
      context: ./backend
    container_name: adaptive_backend
    restart: always
    env_file:
      - .env
    depends_on:
      - db
      - searxng
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

volumes:
  postgres_data:
